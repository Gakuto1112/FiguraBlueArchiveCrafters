name: Attach avatars to release assets

on:
  release:
    types:
      - released
      - prereleased
  workflow_dispatch:

jobs:
  generate_readme:
    name: Generate readme.txt
    needs: get_avatar_branches
    runs-on: ubuntu-latest
    steps:
      - name: Checkout avatar repository
        uses: actions/checkout@v4.2.2
        with:
          path: ./avatar
      - name: Checkout generator repository
        uses: actions/checkout@v4.2.2
        with:
          repository: Gakuto1112/FiguraAvatarsReadmeTemplate
          path: ./generator
      - name: Checkout packer repository
        uses: actions/checkout@v4.2.2
        with:
          repository: Gakuto1112/MyFiguraAvatarPacker
          path: ./packer
      - name: Setup Node.js@20.12.0
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 20.12.0
          cache: npm
          cache-dependency-path: ./packer/package-lock.json
      - name: Install dependencies
        working-directory: ./packer/
        run: npm install
      - name: Generate readme.txt
        working-directory: ./packer/src/
        run: ../node_modules/.bin/ts-node ./readme_txt_generator.ts Gakuto1112/FiguraBlueArchiveCharacters ${TAG_NAME} ${RELEASE_DATE} true ${BRANCH_NAME}
        env:
          TAG_NAME: ${{ github.ref_name }}
          RELEASE_DATE: ${{ github.event.release.created_at }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4.6.2
        with:
          name: readme
          path: ./out/
          retention-days: 1
  pack_figura_avatar:
    name: Pack avatar
    needs:
      - get_avatar_branches
      - generate_readme
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
      - name: Set up uv
        uses: setup-uv@v8.1.0
        with:
          enable-cache: "auto"
      - name: Remove reference images from model files
        run: |
          for ./src/core/models ./src/avatars -name "*.bbmodel" | while read -r model_file
          do
            jq 'del(.reference_images) | .textures[].path = ""' "${model_file}" > "${model_file}.tmp"
            move "${model_file}.tmp" "${model_file}"
          done
      - name: Set up Python 3.14.3
        run: uv python install 3.14.3
      - name: Install dependencies
        run: uv sync
      - name: Build avatars
        run: uv run build.py -r
        working-directory: ./build_scripts/
      - name: Move license files
        run: |
          mv ./LICENSE ./dist/LICENSE
      - name: Download artifacts
        uses: actions/download-artifact@v4.3.0
        with:
          name: readme
          path: ./readmes
      - name: Move readme
        run: |
          mv ./readmes/README.txt ./dist/README.txt
          mv ./readmes/お読みください.txt ./dist/お読みください.txt
      - name: Upload artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: figura_blue_archive_crafters
          path: ./dist/
  attach_avatar:
    name: Attach avatars to release assets
    needs: pack_figura_avatar
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4.3.0
        with:
          name: figura_blue_archive_crafters
          path: ./
      - name: Zip artifact
        run: zip -r figura_blue_archive_crafters.zip ./
      - name: Attach artifacts to release assets
        run: gh release upload ${TAG_NAME} ./figura_blue_archive_crafters.zip --repo ${REPOSITORY}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.release.tag_name }}
          REPOSITORY: ${{ github.repository }}
